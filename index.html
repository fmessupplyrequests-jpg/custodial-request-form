<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Custodial Supply Request</title>
</head>
<body>
    <h1>Custodial Supply Request</h1>

    <form id="supplyForm">
        <label for="requesterName">Your Name:</label>
        <input type="text" id="requesterName" name="requesterName" required>

        <div id="itemsContainer">
            <div class="item-block" data-index="1">
                <h3>Item 1</h3>

                <label for="itemSelect1">Item:</label>
                <select id="itemSelect1" name="itemSelect1" onchange="updateItemFields(1)" required>
                    <option value="">-- Select an item --</option>
                    <option value="toilet_tissue">Toilet Tissue</option>
                    <option value="multifold_towel">Multi Fold Towel</option>
                    <option value="can_liners">Can Liners</option>
                    <option value="hand_soap">Hand Soap</option>
                    <option value="disinfectant">Disinfectant</option>
                </select>

                <label for="description1">Description:</label>
                <input type="text" id="description1" name="description1" readonly>

                <label for="vendor1">Vendor:</label>
                <input type="text" id="vendor1" name="vendor1" readonly>

                <label for="link1">Link:</label>
                <input type="text" id="link1" name="link1" readonly>

                <label for="quantity1">Quantity:</label>
                <input type="number" id="quantity1" name="quantity1" min="1" required>
            </div>
        </div>

        <button type="button" onclick="addItem()">Add Item</button>
        <button type="submit">Submit Request</button>
    </form>

    <script>
        // Item data (you can expand this list)
        const itemData = {
            toilet_tissue: {
                description: "Toilet tissue, 2-ply, case",
                vendor: "Vendor A",
                link: "https://example.com/toilet-tissue"
            },
            multifold_towel: {
                description: "Multi-fold paper towels, case",
                vendor: "Vendor B",
                link: "https://example.com/multifold-towel"
            },
            can_liners: {
                description: "Can liners, 55 gallon, box",
                vendor: "Vendor C",
                link: "https://example.com/can-liners"
            },
            hand_soap: {
                description: "Foaming hand soap, case",
                vendor: "Vendor D",
                link: "https://example.com/hand-soap"
            },
            disinfectant: {
                description: "Disinfectant cleaner, gallon",
                vendor: "Vendor E",
                link: "https://example.com/disinfectant"
            }
        };

        let itemCount = 1;

        function updateItemFields(index) {
            const select = document.getElementById("itemSelect" + index);
            const value = select.value;

            const descInput = document.getElementById("description" + index);
            const vendorInput = document.getElementById("vendor" + index);
            const linkInput = document.getElementById("link" + index);

            if (itemData[value]) {
                descInput.value = itemData[value].description;
                vendorInput.value = itemData[value].vendor;
                linkInput.value = itemData[value].link;
            } else {
                descInput.value = "";
                vendorInput.value = "";
                linkInput.value = "";
            }
        }

        function addItem() {
            itemCount++;
            const container = document.getElementById("itemsContainer");
            const newBlock = document.createElement("div");
            newBlock.className = "item-block";
            newBlock.setAttribute("data-index", itemCount);

            newBlock.innerHTML = `
                <h3>Item ${itemCount}</h3>

                <label for="itemSelect${itemCount}">Item:</label>
                <select id="itemSelect${itemCount}" name="itemSelect${itemCount}" onchange="updateItemFields(${itemCount})" required>
                    <option value="">-- Select an item --</option>
                    <option value="toilet_tissue">Toilet Tissue</option>
                    <option value="multifold_towel">Multi Fold Towel</option>
                    <option value="can_liners">Can Liners</option>
                    <option value="hand_soap">Hand Soap</option>
                    <option value="disinfectant">Disinfectant</option>
                </select>

                <label for="description${itemCount}">Description:</label>
                <input type="text" id="description${itemCount}" name="description${itemCount}" readonly>

                <label for="vendor${itemCount}">Vendor:</label>
                <input type="text" id="vendor${itemCount}" name="vendor${itemCount}" readonly>

                <label for="link${itemCount}">Link:</label>
                <input type="text" id="link${itemCount}" name="link${itemCount}" readonly>

                <label for="quantity${itemCount}">Quantity:</label>
                <input type="number" id="quantity${itemCount}" name="quantity${itemCount}" min="1" required>
            `;

            container.appendChild(newBlock);
        }

        document.getElementById("supplyForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const name = document.getElementById("requesterName").value;
            const blocks = document.querySelectorAll(".item-block");
            let body = `Custodial Supply Request\n\nRequester: ${name}\n\nItems:\n`;

            blocks.forEach(block => {
                const index = block.getAttribute("data-index");
                const itemSelect = document.getElementById("itemSelect" + index);
                const desc = document.getElementById("description" + index).value;
                const vendor = document.getElementById("vendor" + index).value;
                const link = document.getElementById("link" + index).value;
                const qty = document.getElementById("quantity" + index).value;

                if (itemSelect.value) {
                    body += `\nItem ${index}:\n`;
                    body += `- Item: ${itemSelect.options[itemSelect.selectedIndex].text}\n`;
                    body += `- Description: ${desc}\n`;
                    body += `- Vendor: ${vendor}\n`;
                    body += `- Link: ${link}\n`;
                    body += `- Quantity: ${qty}\n`;
                }
            });

            const mailto = "mailto:bookkeeper@example.com"
                + "?subject=" + encodeURIComponent("Custodial Supply Request")
                + "&body=" + encodeURIComponent(body);

            window.location.href = mailto;
        });
    </script>
</body>
</html>
