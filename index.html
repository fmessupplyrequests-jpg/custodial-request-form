// -------------------------------
// HYBRID PRICE SCRAPER (FULL VERSION)
// -------------------------------
async function fetchPriceFromURL(url) {
  try {
    const proxyURL = `https://gentle-field-d67e.michaeljleathers.workers.dev/?url=${encodeURIComponent(url)}`;
    const response = await fetch(proxyURL);
    const html = await response.text();

    const clean = html.replace(/\s+/g, " ").toLowerCase();
    let match;

    //-------------------------------
    // WALMART (URL‑based detection)
    //-------------------------------
    if (url.toLowerCase().includes("walmart.com")) {

    // 1) schema.org product block (most reliable)
    match = clean.match(/"@type":"product"[^}]*"pricecurrency":"usd","price":([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    // 2) schema.org price + availability
    match = clean.match(/"price":([0-9]+\.[0-9]+),"availability":"https:\/\/schema\.org\/instock"/);
    if (match) return `$${match[1]}`;

    // 3) schema.org price without availability
    match = clean.match(/"price":([0-9]+\.[0-9]+),"pricevaliduntil"/);
    if (match) return `$${match[1]}`;

    return "PRICE NOT AVAILABLE";
}      
      
    // -------------------------------
    // AMAZON
    // -------------------------------
    match = clean.match(/"pricetopay":\s*\{\s*"amount":\s*([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    match = clean.match(/"priceamount":\s*"([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    // Amazon generic price (tightened to avoid Walmart)
    match = clean.match(/"price":\s*"\$([0-9]+\.[0-9]+)"/);
    if (match) return `$${match[1]}`;

    // -------------------------------
    // VIP OFFICE
    // -------------------------------
    match = clean.match(/class="price"[^>]*>\s*\$([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    match = clean.match(/price[^<>\d]*([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    // -------------------------------
    // TARGET
    // -------------------------------
    match = clean.match(/"current_retail":\s*([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    match = clean.match(/"formatted_current_price":\s*"\$([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    // -------------------------------
    // HOME DEPOT
    // -------------------------------
    match = clean.match(/"lowprice":\s*"([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    match = clean.match(/"price":\s*"([0-9]+\.[0-9]+)","unit"/);
    if (match) return `$${match[1]}`;

    // -------------------------------
    // LOWE'S
    // -------------------------------
    match = clean.match(/"itemcurrentprice":\s*"([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    match = clean.match(/class="price[^"]*">\s*\$([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    // -------------------------------
    // STAPLES
    // -------------------------------
    match = clean.match(/class="price__value"[^>]*>\s*\$([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    match = clean.match(/"price":\s*"([0-9]+\.[0-9]+)","currency"/);
    if (match) return `$${match[1]}`;

    // -------------------------------
    // OFFICE DEPOT
    // -------------------------------
    match = clean.match(/"offerprice":\s*"([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    match = clean.match(/class="price"[^>]*>\s*\$([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    // -------------------------------
    // GENERIC E‑COMMERCE
    // -------------------------------
    match = clean.match(/ourprice[^>]*>\s*\$([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    match = clean.match(/class="amount"[^>]*>\s*\$([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    // -------------------------------
    // UNIVERSAL FALLBACK
    // -------------------------------
    match = clean.match(/\$([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    match = clean.match(/([0-9]+\.[0-9]+)/);
    if (match) return `$${match[1]}`;

    return "PRICE NOT AVAILABLE";

  } catch (err) {
    return "PRICE NOT AVAILABLE";
  }
}

      urlField.value = "";
      // ⭐ STEP 4 — PRICE LOOKUP FOR CUSTOM URLS
  urlField.addEventListener("input", () => {

    fetchPriceFromURL(url).then(price => {
      priceField.value = price;
    });
  });

      const p = products[value];

      vendorField.readOnly = true;
      urlField.readOnly = true;

           descField.placeholder = "";
      vendorField.placeholder = "";
      urlField.placeholder = "";

      descField.value = p.description;
      vendorField.value = p.vendor;
      urlField.value = p.url;

      const priceField = block.querySelector(".priceField");
      priceField.value = "Fetching...";

      fetchPriceFromURL(p.url).then(price => {
        priceField.value = price;
      });
    }

    validateForm();
  });

  block.querySelector(".qtyField").addEventListener("input", validateForm);

  block.querySelector(".remove-btn").addEventListener("click", () => {
    block.remove();
    itemCount--;
    validateForm();
  });

  validateForm();
}

// ------------------------------
// FORM VALIDATION + FIELD LOGIC
// ------------------------------

function validateForm() {
  const requesterName = document.getElementById("requesterName").value.trim();
  const items = document.querySelectorAll(".item-block");

  let allItemsValid = true;

  items.forEach(item => {
    const product = item.querySelector(".productSelect").value.trim();
    const qty = item.querySelector(".qtyField").value.trim();
    const desc = item.querySelector(".descField")?.value.trim() || "";
    const vendor = item.querySelector(".vendorField")?.value.trim() || "";
    const url = item.querySelector(".urlField")?.value.trim() || "";

    // Custom Request requires ALL fields
    if (product === "Custom Request") {
      if (!product || !qty || !desc || !vendor || !url) {
        allItemsValid = false;
      }
    } else {
      // Standard items require product + quantity only
      if (!product || !qty) {
        allItemsValid = false;
      }
    }
  });

  const formIsValid = requesterName && allItemsValid;
  document.getElementById("submitBtn").disabled = !formIsValid;
}

// Reset quantity when product dropdown changes
document.addEventListener("change", (e) => {
  if (e.target.classList.contains("productSelect")) {
    const itemBlock = e.target.closest(".item-block");
    const qtyField = itemBlock.querySelector(".qtyField");

    qtyField.value = ""; // reset quantity
    validateForm();
  }
});

// Revalidate on ANY input change
document.addEventListener("input", (e) => {
  if (
    e.target.classList.contains("qtyField") ||
    e.target.classList.contains("descField") ||
    e.target.classList.contains("vendorField") ||
    e.target.classList.contains("urlField") ||
    e.target.id === "requesterName"
  ) {
    validateForm();
  }
});

// -------------------------------
// SUBMIT FORM
// -------------------------------
document.getElementById("submitBtn").addEventListener("click", () => {
  const requester = nameField.value.trim();
  const timestamp = new Date().toLocaleString();

  const blocks = document.querySelectorAll(".item-block");

  let emailBody = `
Custodial Supply Request
Submitted by: ${requester}
Date: ${timestamp}

`;

  let i = 1;
  blocks.forEach(block => {
    const product = block.querySelector(".productSelect").value;
    const qty = block.querySelector(".qtyField").value;
    const desc = block.querySelector(".descField").value;
    const vendor = block.querySelector(".vendorField").value;
    const url = block.querySelector(".urlField").value;
    const price = block.querySelector(".priceField").value;

emailBody += `
Item ${i}:
Product: ${product}
Quantity: ${qty}
Description: ${desc}
Vendor: ${vendor}
URL: ${url}
Unit Price: ${price}

`;

    i++;
  });

  emailjs.send("service_gjboq38", "template_xob2g87", {
    subject: "Custodial Supply Request",
    message: emailBody
  }).then(() => {
    alert("Request submitted!");
  }).catch(err => {
    alert("Error sending request.");
    console.error(err);
  });
});
